services:
  unifi-mcp:
    # Default to the published image so plugin deploys can `docker compose pull`
    # without source. Override with --build (or `docker compose build`) for local
    # source development.
    image: ghcr.io/jmagar/rustifi:${RUSTIFI_VERSION:-latest}
    build:
      context: .
      dockerfile: config/Dockerfile
    container_name: unifi-mcp
    restart: unless-stopped
    # entrypoint.sh runs as root and drops to 1000:1000 via gosu
    # do NOT set user: here — entrypoint needs root to chown /data
    env_file:
      - path: .env
        required: false
    ports:
      - "${UNIFI_MCP_PORT:-40030}:40030/tcp"
    volumes:
      - ${HOME}/.unifi:/data
    networks:
      - jakenet

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:40030/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

networks:
  jakenet:
    name: ${DOCKER_NETWORK:-jakenet}
    external: true
