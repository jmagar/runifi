# lefthook.yml — minimal pre-commit hooks (fast only; heavy checks live in CI)
pre-commit:
  parallel: true
  commands:
    diff_check:
      run: git --no-pager diff --check --cached
    toml_fmt:
      glob: "*.toml"
      run: taplo check {staged_files}
    env_guard:
      run: bash scripts/block-env-commits.sh
